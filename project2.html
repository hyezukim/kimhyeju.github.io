<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Kim Library – Kim Hyeju</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Pretendard -->
  <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
  />

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", sans-serif;
      background: #fff;
      color: #000;

      /* 스크롤바 숨기기 */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    /* 뒤로가기 버튼 */

    .back-button,
    .back-button:visited,
    .back-button:hover,
    .back-button:active {

      position: fixed;

      top: 24px;
      left: 24px;

      font-size: 13px;
      font-weight: 400;

      color: #000;

      text-decoration: none;

      z-index: 1000;
    }

    /* 전체 레이아웃 */

    .project-wrap {

      width: 100%;

      display: flex;
      flex-direction: column;

      gap: 48px;

      padding: 80px 60px 120px;
    }

    /* 한 섹션 */

    .section {

      display: flex;
      align-items: flex-start;
      justify-content: space-between;

      gap: 40px;
    }

    /* 이미지 */

    .image-area {
      width: 22%;
    }

    .image-area img {

      width: 100%;

      display: block;

      object-fit: contain;

      background: #000;
    }

    /* 설명 */

    .text-area {

      width: 320px;

      font-size: 13px;
      line-height: 1.7;
    }

    .text-area h1 {

      margin: 0 0 16px;

      font-size: 18px;
      font-weight: 500;
    }

    .text-area p {
      margin: 0;
    }

    /* 모바일 */

    @media (max-width: 768px) {

      .project-wrap {

        gap: 60px;

        padding: 72px 20px 80px;
      }

      .section {

        flex-direction: column;

        gap: 20px;
      }

      .image-area {
        width: 100%;
      }

      .text-area {
        width: 100%;
      }

    }

  </style>
</head>

<body>

  <!-- 뒤로가기 -->

  <a href="index.html" class="back-button">
    ← index
  </a>

  <!-- 프로젝트 -->

  <div class="project-wrap">

    <!-- section 1 -->

    <div class="section">

      <div class="image-area">
        <img src="images/project2-1.jpg" alt="">
      </div>

      <div class="text-area">

        <h1>Academic Project</h1>

        <p>
          Kim Library<br>
          2022<br><br>

          update soon....<br>
          ...
        </p>

      </div>

    </div>

    <!-- section 2 -->

    <div class="section">

      <div class="image-area">
        <img src="images/project2-2.jpg" alt="">
      </div>

      <div class="text-area">

        <p>
          update soon....<br>
          ...
        </p>

      </div>

    </div>

    <!-- section 3 -->

    <div class="section">

      <div class="image-area">
        <img src="images/project2-3.jpg" alt="">
      </div>

      <div class="text-area">

        <p>
          ...<br>
          
        </p>

      </div>

    </div>

  </div>

</body>
</html>
