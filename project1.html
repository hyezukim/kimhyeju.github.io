<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Graduation Project – Kim Hyeju</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Pretendard -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", sans-serif;
      background: #fff;
      color: #000;

      /* 스크롤바 숨기기 */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    /* 전체 레이아웃 */

    .project-wrap {

      width: 100%;

      display: flex;
      flex-direction: column;

      gap: 60px;

      padding: 80px 60px 120px;
    }

    /* 한 섹션 */

    .section {

      display: flex;
      align-items: flex-start;
      justify-content: space-between;

      gap: 40px;
    }

    /* 이미지 */

    .image-area {
      width: 35%;
    }

    .image-area img {

      width: 100%;

      display: block;

      object-fit: contain;

      background: #000;
    }

    /* 설명 */

    .text-area {

      width: 320px;

      font-size: 13px;
      line-height: 1.7;
    }

    .text-area h1 {

      margin: 0 0 16px;

      font-size: 18px;
      font-weight: 500;
    }

    .text-area p {
      margin: 0;
    }

    /* 모바일 */

    @media (max-width: 768px) {

      .project-wrap {
        gap: 80px;
        padding: 40px 20px 80px;
      }

      .section {

        flex-direction: column;

        gap: 24px;
      }

      .image-area {
        width: 100%;
      }

      .text-area {
        width: 100%;
      }

    }

  </style>
</head>

<body>

  <a href="index.html" class="back-button">
    ← index
  </a>

  <div class="project-wrap">

    <!-- section 1 -->

    <div class="section">

      <div class="image-area">
        <img src="images/project1-1.jpg" alt="">
      </div>

      <div class="text-area">

        <h1>Graduation Project</h1>

        <p>
          흔적에서 현상으로<br>
          2023<br><br>

          update soon ....<br>
          ...
        </p>

      </div>

    </div>

    <!-- section 2 -->

    <div class="section">

      <div class="image-area">
        <img src="images/project1-2.jpg" alt="">
      </div>

      <div class="text-area">

        <p>
        update soon ....<br>
        ...
        </p>

      </div>

    </div>

  </div>

</body>
</html>
