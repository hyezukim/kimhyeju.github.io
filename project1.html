<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Graduation Project – Kim Hyeju</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Pretendard -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

  <style>
    body {
      margin: 0;
      font-family: "Pretendard", sans-serif;
      background: #fff;
      color: #000;

      /* 스크롤바 숨기기 */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    /* 슬라이더 */
    .slider {
      display: flex;
      flex-direction: column;   /* ← 세로 스크롤 */
      align-items: center;

      gap: 80px;

      padding: 80px 0 120px;

      overflow-y: auto;

      /* 스크롤바 숨기기 */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .slider::-webkit-scrollbar {
      display: none;
    }

    .slide {
      width: 100%;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide img {
      width: 70vw;          /* ← 이미지 가로폭 균일 */
      max-width: 1000px;

      object-fit: contain;

      background: #000;
    }

    /* 모바일 */
    @media (max-width: 768px) {

      .slider {
        gap: 40px;
        padding: 40px 0 80px;
      }

      .slide img {
        width: calc(100vw - 40px);
      }

    }
  </style>
</head>

<body>

  <!-- IMAGE LIST -->
  <div class="slider">

    <div class="slide">
      <img src="images/project1-1.jpg" alt="">
    </div>

    <div class="slide">
      <img src="images/project1-2.jpg" alt="">
    </div>

  </div>

</body>
</html>
